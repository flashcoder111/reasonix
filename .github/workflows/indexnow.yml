name: Submit IndexNow URLs

on:
  schedule:
    # 08:30 Asia/Shanghai
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      all:
        description: "Submit every URL currently listed in the sitemap"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "List matching URLs without submitting them"
        required: false
        type: boolean
        default: false
      since_days:
        description: "Submit URLs whose sitemap lastmod is within this many days"
        required: false
        type: string
        default: "2"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Submit recent sitemap URLs to IndexNow
        run: npm run indexnow:submit
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          INDEXNOW_SITE_URL: https://www.deepseekreasonix.com
          INDEXNOW_SITEMAP_URL: https://www.deepseekreasonix.com/sitemap.xml
          INDEXNOW_KEY_LOCATION: https://www.deepseekreasonix.com/indexnow-key.txt
          INDEXNOW_SINCE_DAYS: ${{ github.event.inputs.since_days || '2' }}
          INDEXNOW_ALL: ${{ github.event.inputs.all || 'false' }}
          INDEXNOW_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
